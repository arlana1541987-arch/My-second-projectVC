<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Калькулятор семейного бюджета — учёт доходов и расходов">
    <title>Калькулятор — Семейный бюджет</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/calculator.css">
</head>
<body>

<div class="container calculator">

    <header class="page-header">
        <h1>💰 Калькулятор семейного бюджета</h1>
        <a href="index.html" class="back-link">← На главную</a>
    </header>

    <div class="stats">
        <div class="card">
            <h3>Доходы</h3>
            <h2 class="income" id="totalIncome">0 ₽</h2>
        </div>
        <div class="card">
            <h3>Расходы</h3>
            <h2 class="expense" id="totalExpense">0 ₽</h2>
        </div>
        <div class="card">
            <h3>Баланс</h3>
            <h2 class="balance" id="balance">0 ₽</h2>
        </div>
    </div>

    <div class="form-box">
        <div class="form-grid">
            <select id="type">
                <option value="income">Доход</option>
                <option value="expense">Расход</option>
            </select>
            <input type="text" id="description" placeholder="Описание">
            <input type="number" id="amount" placeholder="Сумма" min="0" step="0.01">
            <button class="btn" onclick="addTransaction()">Добавить</button>
        </div>
    </div>

    <div class="percent">
        Расходы составляют <strong id="expensePercent">0%</strong> от доходов
    </div>

    <div class="table-box">
        <div class="table-actions">
            <button class="clear-btn" onclick="clearAll()">Очистить всё</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Тип</th>
                    <th>Описание</th>
                    <th>Сумма</th>
                    <th>Удалить</th>
                </tr>
            </thead>
            <tbody id="transactionTable"></tbody>
        </table>
    </div>

</div>

<button
    class="theme-toggle"
    id="themeToggle"
    type="button"
    onclick="toggleTheme()"
    title="Переключить тему"
    aria-label="Переключить светлую и тёмную тему">
    🌙
</button>

<script src="js/theme.js"></script>
<script src="js/calculator.js"></script>
</body>
</html>
